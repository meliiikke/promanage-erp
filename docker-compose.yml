version: '3.8'

services: 
  db:
    image: postgres:15-alpine
    container_name: promanage_db
    restart: always 
    environment:
      POSTGRES_USER: admin 
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: promanage_erp
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data 

volumes:
  postgres_data: